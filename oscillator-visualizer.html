<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oscilloscope</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #4dff88;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      user-select: none;
    }
    #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
    .hidden { display: none !important; }

    .drop-hint {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      z-index: 10;
    }
    .drop-hint-inner { pointer-events: none; }
    .logo {
      font-size: clamp(1.6rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      color: #4dff88;
      text-shadow: 0 0 18px rgba(77, 255, 136, 0.7);
      margin-bottom: 1rem;
    }
    .drop-hint p { font-size: 1rem; opacity: 0.7; margin: 0.3rem 0; }
    .drop-hint .sub { font-size: 0.8rem; opacity: 0.4; }

    .ui {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: min(620px, calc(100% - 32px));
      background: rgba(0, 12, 4, 0.6);
      border: 1px solid rgba(77, 255, 136, 0.25);
      border-radius: 14px;
      padding: 12px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 20;
      transition: opacity 0.4s ease;
    }
    .ui.idle { opacity: 0; pointer-events: none; }

    .now-playing {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .transport { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .icon-btn {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(77, 255, 136, 0.4);
      background: rgba(77, 255, 136, 0.1);
      color: #4dff88;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .icon-btn:hover { background: rgba(77, 255, 136, 0.22); }
    .time { flex: 0 0 auto; font-variant-numeric: tabular-nums; font-size: 0.8rem; opacity: 0.75; }

    .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 14px 20px; }
    .ctl {
      display: flex; flex-direction: column; gap: 4px;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8;
    }
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 4px; background: rgba(77, 255, 136, 0.35); outline: none;
    }
    input[type="range"].seek { flex: 1 1 auto; }
    #hue {
      background: linear-gradient(90deg,
        #fff, hsl(20,100%,55%), hsl(60,100%,55%), hsl(120,100%,55%),
        hsl(180,100%,55%), hsl(240,100%,55%), hsl(300,100%,55%), hsl(360,100%,55%));
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: #4dff88; cursor: pointer; box-shadow: 0 0 8px rgba(77, 255, 136, 0.9);
    }
    input[type="range"]::-moz-range-thumb {
      width: 13px; height: 13px; border: none; border-radius: 50%; background: #4dff88; cursor: pointer;
    }
    .text-btn {
      background: transparent;
      border: 1px solid rgba(77, 255, 136, 0.3);
      color: #4dff88;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.72rem;
      cursor: pointer;
      margin-top: 12px;
    }
    .text-btn:hover { background: rgba(77, 255, 136, 0.15); }
    .text-btn.rec { color: #ff5a5a; border-color: rgba(255, 90, 90, 0.5); }
    .text-btn.on { background: rgba(77, 255, 136, 0.22); }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="dropHint" class="drop-hint">
    <div class="drop-hint-inner">
      <div class="logo">OSCILLOSCOPE</div>
      <p>Drop an MP3 anywhere, or click to choose a file</p>
      <p class="sub">Audio stays in your browser.</p>
      <p class="sub">Keys 1–0 + Q W E R switch shapes · ← → shape detail · ↑ ↓ audio · space play/pause</p>
    </div>
  </div>

  <div id="ui" class="ui hidden">
    <div class="now-playing" id="nowPlaying">—</div>
    <div class="transport">
      <button id="playBtn" class="icon-btn" title="Play / Pause" aria-label="Play or pause">▶</button>
      <input id="seek" class="seek" type="range" min="0" max="1000" value="0" step="1" />
      <span id="time" class="time">0:00 / 0:00</span>
    </div>
    <div class="controls">
      <label class="ctl">
        <span>Sensitivity</span>
        <input id="sensitivity" type="range" min="0.3" max="2.5" step="0.05" value="1" />
      </label>
      <label class="ctl">
        <span>Shape</span>
        <input id="motion" type="range" min="0" max="1" step="0.01" value="0.4" />
      </label>
      <label class="ctl">
        <span>Audio</span>
        <input id="react" type="range" min="0" max="1" step="0.01" value="1" />
      </label>
      <label class="ctl">
        <span>Color</span>
        <input id="hue" type="range" min="0" max="360" step="1" value="140" />
      </label>
      <label class="ctl">
        <span>Blend</span>
        <input id="blend" type="range" min="0" max="1" step="0.01" value="1" />
      </label>
      <button id="autoBtn" class="text-btn">Auto</button>
      <button id="mirrorBtn" class="text-btn">Mirror</button>
      <button id="backBtn" class="text-btn on">Backdrop</button>
      <button id="newFileBtn" class="text-btn">Load another</button>
      <button id="fsBtn" class="text-btn">Fullscreen</button>
      <button id="recBtn" class="text-btn">● Record</button>
    </div>
  </div>

  <input id="fileInput" type="file" accept="audio/*,.mp3" hidden />

  <script>
  /* Minimal X-Y oscilloscope.
   * Left channel -> X, right channel -> Y, drawn as a glowing green trace on
   * black with phosphor persistence (the Persistence slider controls how long
   * the trail lingers). Audio is decoded locally; nothing is uploaded.
   */
  (() => {
    "use strict";

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d", { alpha: false });
    const dropHint = document.getElementById("dropHint");
    const ui = document.getElementById("ui");
    const fileInput = document.getElementById("fileInput");
    const playBtn = document.getElementById("playBtn");
    const seek = document.getElementById("seek");
    const timeLabel = document.getElementById("time");
    const nowPlaying = document.getElementById("nowPlaying");
    const sensitivityInput = document.getElementById("sensitivity");
    const motionInput = document.getElementById("motion");
    const reactInput = document.getElementById("react");
    const hueInput = document.getElementById("hue");
    const blendInput = document.getElementById("blend");
    const autoBtn = document.getElementById("autoBtn");
    const mirrorBtn = document.getElementById("mirrorBtn");
    const backBtn = document.getElementById("backBtn");
    const newFileBtn = document.getElementById("newFileBtn");
    const fsBtn = document.getElementById("fsBtn");
    const recBtn = document.getElementById("recBtn");

    // ---- Audio ----
    let audioCtx = null;
    let splitter = null;
    let analyserL = null, analyserR = null;
    let scopeL = null, scopeR = null;
    let recDest = null; // audio tap for the video recorder

    let audioBuffer = null;
    let sourceNode = null;
    let isPlaying = false;
    let startedAt = 0;
    let pausedAt = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      splitter = audioCtx.createChannelSplitter(2);
      analyserL = audioCtx.createAnalyser();
      analyserR = audioCtx.createAnalyser();
      analyserL.fftSize = 2048;
      analyserR.fftSize = 2048;
      splitter.connect(analyserL, 0);
      splitter.connect(analyserR, 1);
      scopeL = new Float32Array(analyserL.fftSize);
      scopeR = new Float32Array(analyserR.fftSize);
      freqBuf = new Uint8Array(analyserL.frequencyBinCount);
      recDest = audioCtx.createMediaStreamDestination();
    }

    const duration = () => (audioBuffer ? audioBuffer.duration : 0);

    function currentTime() {
      if (!audioBuffer) return 0;
      const tNow = isPlaying ? pausedAt + (audioCtx.currentTime - startedAt) : pausedAt;
      return Math.max(0, Math.min(tNow, duration()));
    }

    function stopSource() {
      if (sourceNode) {
        sourceNode.onended = null;
        try { sourceNode.stop(); } catch (_) {}
        try { sourceNode.disconnect(); } catch (_) {}
        sourceNode = null;
      }
    }

    function startPlayback(offset) {
      if (!audioBuffer) return;
      if (offset >= duration()) offset = 0;
      stopSource();
      if (audioCtx.state === "suspended") audioCtx.resume();

      sourceNode = audioCtx.createBufferSource();
      sourceNode.buffer = audioBuffer;
      sourceNode.connect(audioCtx.destination); // sound
      sourceNode.connect(splitter);             // scope data (L/R)
      sourceNode.connect(recDest);              // recorder audio tap
      sourceNode.onended = () => {
        isPlaying = false;
        pausedAt = duration();
        playBtn.textContent = "▶";
      };
      sourceNode.start(0, offset);
      startedAt = audioCtx.currentTime;
      pausedAt = offset;
      isPlaying = true;
      playBtn.textContent = "❚❚";
    }

    function pausePlayback() {
      if (!isPlaying) return;
      pausedAt = currentTime();
      stopSource();
      isPlaying = false;
      playBtn.textContent = "▶";
    }

    function togglePlay() {
      if (!audioBuffer) { fileInput.click(); return; }
      if (isPlaying) pausePlayback();
      else startPlayback(pausedAt >= duration() ? 0 : pausedAt);
    }

    async function loadFile(file) {
      if (!file) return;
      initAudio();
      if (audioCtx.state === "suspended") await audioCtx.resume();

      nowPlaying.textContent = "Decoding…  " + file.name;
      dropHint.classList.add("hidden");
      ui.classList.remove("hidden");

      try {
        const arrayBuf = await file.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(arrayBuf);
        stopSource();
        audioBuffer = decoded;
        pausedAt = 0;
        nowPlaying.textContent = "♪  " + file.name;
        startPlayback(0);
      } catch (err) {
        nowPlaying.textContent = "⚠ Couldn't decode “" + file.name + "” — try a standard MP3/WAV/OGG.";
        console.error("decodeAudioData failed:", err);
      }
    }

    fileInput.addEventListener("change", (e) => loadFile(e.target.files[0]));
    dropHint.addEventListener("click", () => fileInput.click());
    newFileBtn.addEventListener("click", () => fileInput.click());

    ["dragenter", "dragover"].forEach((ev) =>
      window.addEventListener(ev, (e) => { e.preventDefault(); })
    );
    window.addEventListener("drop", (e) => {
      e.preventDefault();
      const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    playBtn.addEventListener("click", togglePlay);

    function fmt(s) {
      if (!isFinite(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ":" + String(sec).padStart(2, "0");
    }

    let seeking = false;
    seek.addEventListener("input", () => { seeking = true; });
    seek.addEventListener("change", () => {
      const target = (seek.value / 1000) * duration();
      if (isPlaying) startPlayback(target);
      else { pausedAt = target; }
      seeking = false;
    });

    function updateTransport() {
      const d = duration();
      if (d) {
        if (!seeking) seek.value = String((currentTime() / d) * 1000);
        timeLabel.textContent = fmt(currentTime()) + " / " + fmt(d);
      }
    }

    fsBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    // Record the canvas + audio to a downloadable .webm video.
    let recorder = null, recChunks = [];
    recBtn.addEventListener("click", () => {
      if (recorder) { recorder.stop(); return; }
      initAudio();
      const stream = canvas.captureStream(60);
      recDest.stream.getAudioTracks().forEach((tr) => stream.addTrack(tr));
      const mime = MediaRecorder.isTypeSupported("video/webm;codecs=vp9,opus")
        ? "video/webm;codecs=vp9,opus" : "video/webm";
      recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8000000 });
      recChunks = [];
      recorder.ondataavailable = (e) => { if (e.data.size) recChunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(recChunks, { type: "video/webm" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "oscilloscope.webm";
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
        recorder = null;
        recBtn.textContent = "● Record";
        recBtn.classList.remove("rec");
      };
      recorder.start();
      recBtn.textContent = "■ Stop & save";
      recBtn.classList.add("rec");
    });

    let idleTimer = null;
    function poke() {
      ui.classList.remove("idle");
      document.body.style.cursor = "default";
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        if (isPlaying) { ui.classList.add("idle"); document.body.style.cursor = "none"; }
      }, 3200);
    }
    window.addEventListener("mousemove", poke);
    window.addEventListener("touchstart", poke, { passive: true });

    // ---- Canvas ----
    let W = 0, H = 0, DPR = 1;
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = Math.floor(window.innerWidth * DPR);
      H = Math.floor(window.innerHeight * DPR);
      canvas.width = W;
      canvas.height = H;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      // Offscreen layers for the glow pipeline.
      lineCanvas = lineCanvas || document.createElement("canvas");
      glowCanvas = glowCanvas || document.createElement("canvas");
      lineCanvas.width = W; lineCanvas.height = H;
      glowCanvas.width = Math.max(2, W >> 2); glowCanvas.height = Math.max(2, H >> 2);
      lctx = lineCanvas.getContext("2d");
      gctx = glowCanvas.getContext("2d");

      // Vignette gradient (cached) and a fresh starfield for this size.
      vigGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.42, W / 2, H / 2, Math.hypot(W, H) * 0.58);
      vigGrad.addColorStop(0, "rgba(0,0,0,0)");
      vigGrad.addColorStop(1, "rgba(0,0,0,0.55)");
      stars = [];
      for (let i = 0; i < 110; i++) {
        stars.push({
          x: Math.random() * W, y: Math.random() * H,
          r: (0.5 + Math.random() * 1.3) * DPR,
          ph: Math.random() * 6.28, sp: 0.15 + Math.random() * 0.6,
        });
      }
    }
    window.addEventListener("resize", resize);
    resize();

    // ---- Draw ----
    // Slowly-evolving motion state, layered on top of the live trace so the
    // figure never repeats exactly. None of this changes the green look.
    let t = 0, last = performance.now();
    let rot = 0;            // precessing rotation of the figure
    let energy = 0;         // smoothed loudness (RMS) of the signal
    let slow = 1;           // current pace multiplier
    let slowTarget = 1;     // pace it's easing toward
    let nextEvent = 0;      // time of the next random pace change
    let breathe = 1;        // breathing zoom

    // Shape morphing: forms are picked with keys 1–0 and Q W E R; the line
    // eases fluidly from the old form to the new one.
    const NSHAPES = 14;
    let formA = 0, formB = 0, morph = 1;
    let autoMode = false, lastShapeT = 0; // auto-VJ: morph on hits/lulls
    let mirrorOn = false, backdropOn = true;

    // Bloom: a slow-attack swell + brightening triggered by strong hits.
    let fastE = 0, bloom = 0, bloomTarget = 0, bloomGate = 0;

    // Slow per-band envelopes that reshape the structure of the form:
    // bass -> coil count, mids -> twist, treble -> line thickness.
    let freqBuf = null;
    let bassS = 0, midS = 0, trebS = 0;

    // Render layers: the line draws on its own canvas, then gets composited
    // with a real downscale-and-blur glow (much prettier and cheaper than
    // per-stroke shadowBlur). Plus backdrop furniture.
    let lineCanvas = null, lctx = null, glowCanvas = null, gctx = null;
    let vigGrad = null, stars = [];

    // Lorenz attractor path, computed once and reused.
    let lorenzPts = null;
    function getLorenz() {
      if (lorenzPts) return lorenzPts;
      const N = 2400;
      lorenzPts = new Float32Array(N * 3);
      let x = 0.1, y = 0, z = 25;
      for (let i = 0; i < 1500; i++) { // settle onto the attractor
        const dx = 10 * (y - x), dy = x * (28 - z) - y, dz = x * y - (8 / 3) * z;
        x += dx * 0.004; y += dy * 0.004; z += dz * 0.004;
      }
      let maxA = 0.0001;
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < 3; j++) {
          const dx = 10 * (y - x), dy = x * (28 - z) - y, dz = x * y - (8 / 3) * z;
          x += dx * 0.004; y += dy * 0.004; z += dz * 0.004;
        }
        lorenzPts[i * 3] = x;
        lorenzPts[i * 3 + 1] = z - 25;
        lorenzPts[i * 3 + 2] = y;
        maxA = Math.max(maxA, Math.abs(x), Math.abs(z - 25), Math.abs(y));
      }
      for (let i = 0; i < N * 3; i++) lorenzPts[i] /= maxA;
      return lorenzPts;
    }

    // Superformula radius (bounded star/flower profiles).
    function superR(ang, m, n1, n2, n3) {
      const c = Math.abs(Math.cos(m * ang / 4));
      const s = Math.abs(Math.sin(m * ang / 4));
      return Math.pow(Math.pow(c, n2) + Math.pow(s, n3), -1 / n1);
    }

    // Waveform smoothed along its length and blended across frames, so the
    // line's displacement glides instead of jittering.
    let smoothBuf = null, scratchBuf = null;

    function drawScope(sens, energy, flicker, motion, react, bloom) {
      const n = scopeL.length;
      const TWO_PI = Math.PI * 2;
      const PI = Math.PI;
      const baseR = Math.min(W, H) * 0.40 * sens;

      // "Shape" = how many times the single line winds. Audio (react) sets how
      // much the sound displaces the line: 0 = fully contained clean form,
      // 1 = full distortion like before.
      // Structure is also audio-mapped (gated by the same slider): bass adds
      // coils, mids twist the form, treble thickens the stroke. All slow
      // envelopes, so the shape itself re-forms with the song.
      const struct = react * 2;
      const loops = (1 + motion * 14) * (1 + (bassS - 0.25) * 0.9 * struct);
      const twistK = midS * 1.6 * struct;
      const thickK = 1 + trebS * 0.9 * struct;
      const amp = (0.2 + Math.min(energy, 0.3)) * react;
      const tilt = 0.6 + 0.4 * Math.sin(t * 0.13);
      const ct = Math.cos(tilt), st = Math.sin(tilt);

      // The 3D forms the line can take. Each maps path position p (0..1) and
      // the audio sample s to a point [x,y,z]; `a` is the audio displacement.
      // Forms are defined unrotated — one shared yaw spin is applied to the
      // blended point afterwards, so every shape turns identically and morphs
      // read as a single object re-folding itself.
      function formPoint(form, p, s, out) {
        const a = s * amp;
        const th = p * TWO_PI * loops;
        let x, y, z;
        switch (form) {
          case 1: { // torus
            const R = baseR * 0.68, r2 = baseR * 0.30 * (1 + a);
            const v = p * TWO_PI * Math.max(2, loops * 0.5);
            const rr = R + r2 * Math.cos(v);
            x = rr * Math.cos(th); y = r2 * Math.sin(v); z = rr * Math.sin(th);
            break;
          }
          case 2: { // helix / spring
            const r = baseR * 0.6 * (1 + a);
            x = r * Math.cos(th); y = (p - 0.5) * 2 * baseR; z = r * Math.sin(th);
            break;
          }
          case 3: { // lissajous knot
            const R = baseR * (1 + a * 0.5);
            const C = Math.max(2, loops * 0.5);
            x = R * Math.sin(3 * p * TWO_PI);
            y = R * Math.sin(2 * p * TWO_PI + 0.9);
            z = R * Math.sin(C * p * TWO_PI + 0.4);
            break;
          }
          case 4: { // cone spiral
            const r = baseR * p * (1 + a);
            x = r * Math.cos(th); y = (p - 0.5) * 2 * baseR; z = r * Math.sin(th);
            break;
          }
          case 5: { // rose / flower with a depth wave
            const k = Math.max(2, 2 + loops * 0.4);
            const rr = baseR * (0.35 + 0.65 * Math.abs(Math.cos(k * p * TWO_PI))) * (1 + a);
            const ang = p * TWO_PI * Math.max(1, loops * 0.3);
            x = rr * Math.cos(ang); y = rr * Math.sin(ang); z = baseR * 0.3 * Math.sin(p * TWO_PI * 3);
            break;
          }
          case 6: { // torus knot — a line tied around an invisible donut
            const q = 3 + loops * 0.3;
            const u = p * TWO_PI;
            const R = baseR * 0.34 * (1 + a);
            const rr = Math.cos(q * u) + 2;
            x = R * rr * Math.cos(2 * u);
            y = R * rr * Math.sin(2 * u);
            z = R * -Math.sin(q * u) * 1.4;
            break;
          }
          case 7: { // Möbius edge — one line tracing a twisted band
            const u = p * TWO_PI * 2; // the edge closes after two trips around
            const v = 0.38 * (1 + a);
            const R = baseR * 0.62;
            x = R * (1 + v * Math.cos(u / 2)) * Math.cos(u);
            z = R * (1 + v * Math.cos(u / 2)) * Math.sin(u);
            y = R * v * Math.sin(u / 2) * 1.6;
            break;
          }
          case 8: { // butterfly curve, given depth with a slow z-wave
            const u = p * PI * 24;
            const rb = Math.exp(Math.sin(u)) - 2 * Math.cos(4 * u)
                     + Math.pow(Math.sin((2 * u - PI) / 24), 5);
            const R = baseR * 0.26 * (1 + a);
            x = R * rb * Math.sin(u);
            y = R * rb * Math.cos(u);
            z = baseR * 0.3 * Math.sin(u * 0.5);
            break;
          }
          case 9: { // infinity ribbon — a winding figure-eight band
            const u = p * TWO_PI * Math.max(1, loops * 0.4);
            const R = baseR * (1 + a);
            x = R * Math.sin(u);
            y = R * Math.sin(u) * Math.cos(u) * 0.9;
            z = R * 0.35 * Math.cos(3 * u);
            break;
          }
          case 10: { // Lorenz attractor — chaos, traced as one line
            const L = getLorenz();
            const NL = L.length / 3;
            const fi = p * (NL - 1.001);
            const i0 = Math.floor(fi), fr = fi - i0;
            const sc = baseR * 1.05 * (1 + a * 0.5);
            x = (L[i0 * 3] + (L[i0 * 3 + 3] - L[i0 * 3]) * fr) * sc;
            y = (L[i0 * 3 + 1] + (L[i0 * 3 + 4] - L[i0 * 3 + 1]) * fr) * sc;
            z = (L[i0 * 3 + 2] + (L[i0 * 3 + 5] - L[i0 * 3 + 2]) * fr) * sc;
            break;
          }
          case 11: { // supershape — a spiky superformula star swept in 3D
            const lon = th * 0.5;
            const lat = (p - 0.5) * PI;
            const r1 = superR(lon, 6, 0.3, 0.3, 0.3);
            const r2 = superR(lat, 4, 0.7, 0.7, 0.7);
            const R = baseR * 0.85 * (1 + a);
            x = R * r1 * Math.cos(lon) * r2 * Math.cos(lat);
            y = R * r2 * Math.sin(lat);
            z = R * r1 * Math.sin(lon) * r2 * Math.cos(lat);
            break;
          }
          case 12: { // DNA — two strands with rungs, drawn as one line
            const turns = 3 + loops * 0.25;
            const u = p * TWO_PI * turns;
            const strand = Math.floor(p * 44) % 2; // hop between strands
            const r = baseR * 0.42 * (1 + a);
            x = r * Math.cos(u + strand * PI);
            z = r * Math.sin(u + strand * PI);
            y = (p - 0.5) * 2 * baseR;
            break;
          }
          case 13: { // Klein figure-eight — a self-passing twisted bottle
            const u = p * TWO_PI;
            const v = p * TWO_PI * Math.max(8, loops * 2);
            const w = Math.cos(u / 2) * Math.sin(v) - Math.sin(u / 2) * Math.sin(2 * v);
            const R = baseR * 0.5;
            const rr = R * (1 + 0.45 * (1 + a) * w);
            x = rr * Math.cos(u);
            y = rr * Math.sin(u);
            z = R * 0.75 * (Math.sin(u / 2) * Math.sin(v) + Math.cos(u / 2) * Math.sin(2 * v));
            break;
          }
          default: { // 0: globe / sphere
            const r = baseR * (1 + a);
            const phi = p * PI, sp = Math.sin(phi);
            x = r * sp * Math.cos(th); y = r * Math.cos(phi); z = r * sp * Math.sin(th);
          }
        }
        out[0] = x; out[1] = y; out[2] = z;
      }

      const A = [0, 0, 0], B = [0, 0, 0];
      // Smoothstep morph easing, capped by the Blend slider — at 1 a morph
      // completes into the new form; below 1 the line holds a permanent
      // in-between hybrid of the two shapes.
      const ease = (morph * morph * (3 - 2 * morph)) * parseFloat(blendInput.value);
      const cy = Math.cos(rot), sy = Math.sin(rot); // shared yaw spin
      const persp = baseR * 3.2;                    // camera distance
      const pts = [];
      for (let i = 0; i < n; i += 4) {
        const p = i / n;
        const s = smoothBuf[i] * 3.2; // smoothed signal (boosted to keep depth)
        formPoint(formA, p, s, A);
        let x3 = A[0], y3 = A[1], z3 = A[2];
        if (ease > 0) {               // ease between the old and new form
          formPoint(formB, p, s, B);
          x3 += (B[0] - x3) * ease;
          y3 += (B[1] - y3) * ease;
          z3 += (B[2] - z3) * ease;
        }
        // Mid frequencies twist the form around its vertical axis.
        if (twistK) {
          const tw = twistK * (y3 / baseR);
          const cw = Math.cos(tw), sw = Math.sin(tw);
          const xt = x3 * cw + z3 * sw;
          z3 = -x3 * sw + z3 * cw;
          x3 = xt;
        }
        // Yaw, then tilt — keeping the depth coordinate for perspective
        // projection and near/far shading.
        const xr = x3 * cy + z3 * sy;
        const zr = -x3 * sy + z3 * cy;
        const yt = y3 * ct - zr * st;
        const zd = y3 * st + zr * ct;
        const f = persp / Math.max(persp * 0.4, persp - zd);
        pts.push(xr * f, yt * f, Math.max(0, Math.min(1, zd / baseR * 0.5 + 0.5)));
      }

      // Quadratic midpoint smoothing (no hard corners), split into depth bands
      // so nearer parts of the line draw thicker and brighter than farther
      // ones — that's what makes the figure read as truly 3D.
      const NB = 6;
      const bands = [];
      for (let b = 0; b < NB; b++) bands.push(new Path2D());
      const m = pts.length / 3;
      let prevB = -1;
      for (let k = 1; k < m - 1; k++) {
        const x1 = pts[3 * k], y1 = pts[3 * k + 1];
        const b = Math.min(NB - 1, Math.floor(pts[3 * k + 2] * NB));
        if (b !== prevB) {
          bands[b].moveTo((pts[3 * (k - 1)] + x1) / 2, (pts[3 * (k - 1) + 1] + y1) / 2);
          prevB = b;
        }
        bands[b].quadraticCurveTo(x1, y1, (x1 + pts[3 * (k + 1)]) / 2, (y1 + pts[3 * (k + 1) + 1]) / 2);
      }

      // Draw onto the line layer; the real glow is added in the composite
      // pass (downscale + blur), so no per-stroke shadows are needed.
      lctx.clearRect(0, 0, W, H);
      lctx.save();
      lctx.translate(W / 2, H / 2);
      lctx.rotate(0.12 * Math.sin(t * 0.09)); // slow rolling sway
      lctx.scale(breathe, breathe);
      lctx.globalCompositeOperation = "lighter";
      lctx.lineJoin = "round";
      lctx.lineCap = "round";

      // Color slider: far left fades to pure white, then the full hue wheel.
      // Green (140) is the default.
      const hue = parseFloat(hueInput.value);
      const sat = Math.min(100, (hue / 14) * 100);
      const glowL = 58 + (100 - sat) * 0.25; // white end glows a touch brighter
      const swell = 1 + bloom * 0.35;        // bloom brightens + thickens

      // Far bands first, near bands last: a colored body and a hot near-white
      // core, scaled by each band's depth factor (and treble thickness).
      for (let b = 0; b < NB; b++) {
        const df = (b + 0.5) / NB; // 0 = far .. 1 = near
        const wf = (0.55 + 0.9 * df) * thickK;
        const af = 0.35 + 0.75 * df;

        lctx.lineWidth = (2.2 + energy * 2.2 * react) * wf * swell * DPR;
        lctx.strokeStyle = "hsla(" + hue + ", " + sat + "%, " + (glowL + 4) + "%, " +
          Math.min(1, 0.55 * flicker * af * swell).toFixed(3) + ")";
        lctx.stroke(bands[b]);

        lctx.lineWidth = (0.9 + energy * 0.8 * react) * wf * swell * DPR;
        lctx.strokeStyle = "hsla(" + hue + ", " + sat + "%, 90%, " +
          Math.min(1, 0.95 * flicker * (0.5 + 0.5 * df) * swell).toFixed(3) + ")";
        lctx.stroke(bands[b]);
      }

      // Mirror twin: the same figure flipped and slightly turned, drawn
      // dimmer with a nudged hue, so the two interlock without clutter.
      if (mirrorOn) {
        lctx.scale(-1, 1);
        lctx.rotate(0.5 + 0.3 * Math.sin(t * 0.05));
        for (let b = 0; b < NB; b++) {
          const df = (b + 0.5) / NB;
          lctx.lineWidth = (1.5 + energy * 1.4 * react) * (0.55 + 0.9 * df) * thickK * swell * DPR;
          lctx.strokeStyle = "hsla(" + (hue + 30) + ", " + sat + "%, " + (glowL + 8) + "%, " +
            Math.min(1, 0.32 * flicker * (0.35 + 0.75 * df) * swell).toFixed(3) + ")";
          lctx.stroke(bands[b]);
        }
      }

      lctx.restore();
    }

    // Backdrop atmosphere: a faint bass-reactive color wash plus a slowly
    // twinkling starfield. Kept dim so the line stays the star of the show.
    function drawBackdrop(react) {
      const hue = parseFloat(hueInput.value);
      const sat = Math.min(100, (hue / 14) * 100);
      const a = 0.03 + (energy * 0.12 + bloom * 0.08) * react * 2;
      const g = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.75);
      g.addColorStop(0, "hsla(" + hue + ", " + sat + "%, 40%, " + Math.min(0.16, a).toFixed(3) + ")");
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#fff";
      for (const s of stars) {
        const tw = 0.5 + 0.5 * Math.sin(t * s.sp + s.ph);
        ctx.globalAlpha = 0.04 + 0.2 * tw * tw;
        ctx.fillRect(s.x, s.y, s.r, s.r);
      }
      ctx.globalAlpha = 1;
    }

    function frame(now) {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      try {
        if (analyserL) {
          analyserL.getFloatTimeDomainData(scopeL);
          analyserR.getFloatTimeDomainData(scopeR);
          updateTransport();

          const n = scopeL.length;
          t += dt;

          // Fluidity: low-pass the waveform along its length in BOTH directions
          // (symmetric, so peaks round off without dragging sideways), then
          // blend gently with the previous frame so displacement drifts like
          // liquid instead of twitching with every sample.
          if (!smoothBuf) { smoothBuf = new Float32Array(n); scratchBuf = new Float32Array(n); }
          let acc = 0;
          for (let i = 0; i < n; i++) {
            acc += (((scopeL[i] + scopeR[i]) * 0.5) - acc) * 0.06;
            scratchBuf[i] = acc;
          }
          acc = 0;
          for (let i = n - 1; i >= 0; i--) {
            acc += (scratchBuf[i] - acc) * 0.06;
            smoothBuf[i] += (acc - smoothBuf[i]) * 0.12;
          }

          // Track loudness (RMS). Quiet passages settle into one calm line;
          // loud passages whip the line around into a tangle of loops.
          let sum = 0, cnt = 0;
          for (let i = 0; i < n; i += 4) { const v = scopeL[i]; sum += v * v; cnt++; }
          const rms = Math.sqrt(sum / cnt);
          energy += (rms - energy) * 0.05;

          // Slow band envelopes that re-form the structure of the shape.
          analyserL.getByteFrequencyData(freqBuf);
          const fb = freqBuf.length;
          let bb = 0, mm = 0, tt = 0;
          const bEnd = Math.floor(fb * 0.06), mEnd = Math.floor(fb * 0.3);
          for (let i = 0; i < bEnd; i++) bb += freqBuf[i];
          for (let i = bEnd; i < mEnd; i++) mm += freqBuf[i];
          for (let i = mEnd; i < fb; i++) tt += freqBuf[i];
          bassS += (bb / (bEnd * 255) - bassS) * 0.04;
          midS += (mm / ((mEnd - bEnd) * 255) - midS) * 0.04;
          trebS += (tt / ((fb - mEnd) * 255) - trebS) * 0.04;

          // Every few seconds pick a new pace at random: nearly still, fast, or
          // reversed. This drift is what carries it from stable to crazy.
          if (t > nextEvent) {
            nextEvent = t + 3 + Math.random() * 6;
            const r = Math.random();
            slowTarget = r < 0.35 ? 0.05 + Math.random() * 0.2
                       : r < 0.70 ? 0.9 + Math.random() * 0.8
                       :          -(0.6 + Math.random() * 0.8);
          }
          slow += (slowTarget - slow) * dt * 0.4;

          // Rotation precesses the line; with long persistence its past
          // positions stack into the looping circle. Loudness speeds it up, and
          // the Motion slider scales it — at 0 the line stops precessing and
          // stays a single stable stroke.
          // One master slider. Near 0: no precession + fast-clearing trail =>
          // a single clean line. Toward 1: precession + long trails build the
          // looping tangle.
          const motion = parseFloat(motionInput.value);
          // Halve the Audio range: the slider's full right is the old 50%.
          const react = parseFloat(reactInput.value) * 0.5;
          // Steady spin; loudness only speeds it up as far as Audio allows.
          rot += (0.3 + energy * 1.1 * react) * slow * dt;

          // Shapes are picked with the number keys 1–0; the morph eases ~3s.
          if (morph < 1) morph = Math.min(1, morph + dt * 0.35);

          // Bloom: a fast envelope spots strong hits; the swell rises over
          // ~half a second then relaxes — drama without shake. Gated by Audio.
          fastE += (rms - fastE) * 0.5;
          if (fastE > energy * 1.5 && fastE > 0.06 && t > bloomGate) {
            bloomTarget = 1;
            bloomGate = t + 0.5;
          }
          bloomTarget *= Math.exp(-dt * 1.4);
          bloom += (bloomTarget - bloom) * dt * 5;

          // Auto mode: morph to a new shape on a strong hit or a quiet lull —
          // never sooner than ~14s after the last change, always within ~45s.
          if (autoMode) {
            const due = t - lastShapeT;
            if ((due > 14 && (bloomTarget > 0.9 || energy < 0.04)) || due > 45) {
              formA = formB;
              formB = (formB + 1 + Math.floor(Math.random() * (NSHAPES - 1))) % NSHAPES;
              morph = 0;
              lastShapeT = t;
            }
          }

          // Gentle breathing, swelling with the music and the bloom.
          breathe = 1 + 0.035 * Math.sin(t * 0.31) + (energy * 0.35 + bloom * 0.3) * react;

          const sens = parseFloat(sensitivityInput.value);

          // Barely-there brightness shimmer — slow, never strobing.
          const flicker = 0.97 + 0.03 * Math.sin(t * 2.6 + Math.sin(t * 0.9) * 2);
          drawScope(sens, energy, flicker, motion, react, bloom);

          // Composite: black, backdrop, real glow (downscale + blur the line
          // layer twice), the crisp line itself, then a vignette.
          ctx.globalCompositeOperation = "source-over";
          ctx.fillStyle = "#000";
          ctx.fillRect(0, 0, W, H);

          if (backdropOn) drawBackdrop(react);

          gctx.clearRect(0, 0, glowCanvas.width, glowCanvas.height);
          gctx.drawImage(lineCanvas, 0, 0, glowCanvas.width, glowCanvas.height);
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.filter = "blur(" + (3 * DPR) + "px)";
          ctx.globalAlpha = Math.min(1, 0.6 * (1 + bloom * 0.6));
          ctx.drawImage(glowCanvas, 0, 0, W, H);
          ctx.filter = "blur(" + (9 * DPR) + "px)";
          ctx.globalAlpha = Math.min(1, 0.4 * (1 + bloom));
          ctx.drawImage(glowCanvas, 0, 0, W, H);
          ctx.filter = "none";
          ctx.globalAlpha = 1;
          ctx.drawImage(lineCanvas, 0, 0);
          ctx.restore();

          if (backdropOn) {
            ctx.fillStyle = vigGrad;
            ctx.fillRect(0, 0, W, H);
          }
        } else {
          ctx.fillStyle = "rgba(0,0,0,0.3)";
          ctx.fillRect(0, 0, W, H);
        }
      } catch (err) {
        console.error("render error:", err);
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // Clamp a range input to its min/max while nudging it by delta.
    function nudge(input, delta) {
      const lo = parseFloat(input.min), hi = parseFloat(input.max);
      input.value = String(Math.max(lo, Math.min(hi, parseFloat(input.value) + delta)));
    }
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); togglePlay(); }
      else if (e.key === "f" || e.key === "F") fsBtn.click();
      // Arrow keys: left/right = Shape, up/down = Audio.
      else if (e.key === "ArrowRight") { e.preventDefault(); nudge(motionInput, 0.05); }
      else if (e.key === "ArrowLeft") { e.preventDefault(); nudge(motionInput, -0.05); }
      else if (e.key === "ArrowUp") { e.preventDefault(); nudge(reactInput, 0.05); }
      else if (e.key === "ArrowDown") { e.preventDefault(); nudge(reactInput, -0.05); }
      else {
        // Keys 1–0 and Q W E R pick a shape; the line morphs to it fluidly.
        const k = e.key.toLowerCase();
        let idx = "1234567890".indexOf(e.key);
        if (idx === -1) {
          const qi = "qwer".indexOf(k);
          if (qi !== -1) idx = 10 + qi;
        }
        if (idx !== -1 && idx !== formB) {
          formA = formB;
          formB = idx;
          morph = 0;
          lastShapeT = t; // manual picks reset the auto-VJ clock
        }
      }
    });

    // Toggles: auto shape changes, the mirror twin, and the backdrop.
    autoBtn.addEventListener("click", () => {
      autoMode = !autoMode;
      autoBtn.classList.toggle("on", autoMode);
      lastShapeT = t;
    });
    mirrorBtn.addEventListener("click", () => {
      mirrorOn = !mirrorOn;
      mirrorBtn.classList.toggle("on", mirrorOn);
    });
    backBtn.addEventListener("click", () => {
      backdropOn = !backdropOn;
      backBtn.classList.toggle("on", backdropOn);
    });
  })();
  </script>
</body>
