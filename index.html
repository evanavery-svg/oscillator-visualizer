<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oscilloscope</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #4dff88;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      user-select: none;
    }
    #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
    .hidden { display: none !important; }

    .drop-hint {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      z-index: 10;
    }
    .drop-hint-inner { pointer-events: none; }
    .logo {
      font-size: clamp(1.6rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      color: #4dff88;
      text-shadow: 0 0 18px rgba(77, 255, 136, 0.7);
      margin-bottom: 1rem;
    }
    .drop-hint p { font-size: 1rem; opacity: 0.7; margin: 0.3rem 0; }
    .drop-hint .sub { font-size: 0.8rem; opacity: 0.4; }

    .ui {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: min(620px, calc(100% - 32px));
      background: rgba(0, 12, 4, 0.6);
      border: 1px solid rgba(77, 255, 136, 0.25);
      border-radius: 14px;
      padding: 12px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 20;
      transition: opacity 0.4s ease;
    }
    .ui.idle { opacity: 0; pointer-events: none; }

    .now-playing {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .transport { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .icon-btn {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(77, 255, 136, 0.4);
      background: rgba(77, 255, 136, 0.1);
      color: #4dff88;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .icon-btn:hover { background: rgba(77, 255, 136, 0.22); }
    .time { flex: 0 0 auto; font-variant-numeric: tabular-nums; font-size: 0.8rem; opacity: 0.75; }

    .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 14px 20px; }
    .ctl {
      display: flex; flex-direction: column; gap: 4px;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8;
    }
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 4px; background: rgba(77, 255, 136, 0.35); outline: none;
    }
    input[type="range"].seek { flex: 1 1 auto; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: #4dff88; cursor: pointer; box-shadow: 0 0 8px rgba(77, 255, 136, 0.9);
    }
    input[type="range"]::-moz-range-thumb {
      width: 13px; height: 13px; border: none; border-radius: 50%; background: #4dff88; cursor: pointer;
    }
    .text-btn {
      background: transparent;
      border: 1px solid rgba(77, 255, 136, 0.3);
      color: #4dff88;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.72rem;
      cursor: pointer;
      margin-top: 12px;
    }
    .text-btn:hover { background: rgba(77, 255, 136, 0.15); }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="dropHint" class="drop-hint">
    <div class="drop-hint-inner">
      <div class="logo">OSCILLOSCOPE</div>
      <p>Drop an MP3 anywhere, or click to choose a file</p>
      <p class="sub">Stereo tracks draw the best figures. Audio stays in your browser.</p>
    </div>
  </div>

  <div id="ui" class="ui hidden">
    <div class="now-playing" id="nowPlaying">—</div>
    <div class="transport">
      <button id="playBtn" class="icon-btn" title="Play / Pause" aria-label="Play or pause">▶</button>
      <input id="seek" class="seek" type="range" min="0" max="1000" value="0" step="1" />
      <span id="time" class="time">0:00 / 0:00</span>
    </div>
    <div class="controls">
      <label class="ctl">
        <span>Sensitivity</span>
        <input id="sensitivity" type="range" min="0.3" max="2.5" step="0.05" value="1" />
      </label>
      <label class="ctl">
        <span>Persistence</span>
        <input id="trails" type="range" min="0.02" max="0.4" step="0.01" value="0.08" />
      </label>
      <button id="newFileBtn" class="text-btn">Load another</button>
      <button id="fsBtn" class="text-btn">Fullscreen</button>
    </div>
  </div>

  <input id="fileInput" type="file" accept="audio/*,.mp3" hidden />

  <script>
  /* Minimal X-Y oscilloscope.
   * Left channel -> X, right channel -> Y, drawn as a glowing green trace on
   * black with phosphor persistence (the Persistence slider controls how long
   * the trail lingers). Audio is decoded locally; nothing is uploaded.
   */
  (() => {
    "use strict";

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d", { alpha: false });
    const dropHint = document.getElementById("dropHint");
    const ui = document.getElementById("ui");
    const fileInput = document.getElementById("fileInput");
    const playBtn = document.getElementById("playBtn");
    const seek = document.getElementById("seek");
    const timeLabel = document.getElementById("time");
    const nowPlaying = document.getElementById("nowPlaying");
    const sensitivityInput = document.getElementById("sensitivity");
    const trailsInput = document.getElementById("trails");
    const newFileBtn = document.getElementById("newFileBtn");
    const fsBtn = document.getElementById("fsBtn");

    // ---- Audio ----
    let audioCtx = null;
    let splitter = null;
    let analyserL = null, analyserR = null;
    let scopeL = null, scopeR = null;

    let audioBuffer = null;
    let sourceNode = null;
    let isPlaying = false;
    let startedAt = 0;
    let pausedAt = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      splitter = audioCtx.createChannelSplitter(2);
      analyserL = audioCtx.createAnalyser();
      analyserR = audioCtx.createAnalyser();
      analyserL.fftSize = 2048;
      analyserR.fftSize = 2048;
      splitter.connect(analyserL, 0);
      splitter.connect(analyserR, 1);
      scopeL = new Float32Array(analyserL.fftSize);
      scopeR = new Float32Array(analyserR.fftSize);
    }

    const duration = () => (audioBuffer ? audioBuffer.duration : 0);

    function currentTime() {
      if (!audioBuffer) return 0;
      const tNow = isPlaying ? pausedAt + (audioCtx.currentTime - startedAt) : pausedAt;
      return Math.max(0, Math.min(tNow, duration()));
    }

    function stopSource() {
      if (sourceNode) {
        sourceNode.onended = null;
        try { sourceNode.stop(); } catch (_) {}
        try { sourceNode.disconnect(); } catch (_) {}
        sourceNode = null;
      }
    }

    function startPlayback(offset) {
      if (!audioBuffer) return;
      if (offset >= duration()) offset = 0;
      stopSource();
      if (audioCtx.state === "suspended") audioCtx.resume();

      sourceNode = audioCtx.createBufferSource();
      sourceNode.buffer = audioBuffer;
      sourceNode.connect(audioCtx.destination); // sound
      sourceNode.connect(splitter);             // scope data (L/R)
      sourceNode.onended = () => {
        isPlaying = false;
        pausedAt = duration();
        playBtn.textContent = "▶";
      };
      sourceNode.start(0, offset);
      startedAt = audioCtx.currentTime;
      pausedAt = offset;
      isPlaying = true;
      playBtn.textContent = "❚❚";
    }

    function pausePlayback() {
      if (!isPlaying) return;
      pausedAt = currentTime();
      stopSource();
      isPlaying = false;
      playBtn.textContent = "▶";
    }

    function togglePlay() {
      if (!audioBuffer) { fileInput.click(); return; }
      if (isPlaying) pausePlayback();
      else startPlayback(pausedAt >= duration() ? 0 : pausedAt);
    }

    async function loadFile(file) {
      if (!file) return;
      initAudio();
      if (audioCtx.state === "suspended") await audioCtx.resume();

      nowPlaying.textContent = "Decoding…  " + file.name;
      dropHint.classList.add("hidden");
      ui.classList.remove("hidden");

      try {
        const arrayBuf = await file.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(arrayBuf);
        stopSource();
        audioBuffer = decoded;
        pausedAt = 0;
        nowPlaying.textContent = "♪  " + file.name;
        startPlayback(0);
      } catch (err) {
        nowPlaying.textContent = "⚠ Couldn't decode “" + file.name + "” — try a standard MP3/WAV/OGG.";
        console.error("decodeAudioData failed:", err);
      }
    }

    fileInput.addEventListener("change", (e) => loadFile(e.target.files[0]));
    dropHint.addEventListener("click", () => fileInput.click());
    newFileBtn.addEventListener("click", () => fileInput.click());

    ["dragenter", "dragover"].forEach((ev) =>
      window.addEventListener(ev, (e) => { e.preventDefault(); })
    );
    window.addEventListener("drop", (e) => {
      e.preventDefault();
      const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    playBtn.addEventListener("click", togglePlay);

    function fmt(s) {
      if (!isFinite(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ":" + String(sec).padStart(2, "0");
    }

    let seeking = false;
    seek.addEventListener("input", () => { seeking = true; });
    seek.addEventListener("change", () => {
      const target = (seek.value / 1000) * duration();
      if (isPlaying) startPlayback(target);
      else { pausedAt = target; }
      seeking = false;
    });

    function updateTransport() {
      const d = duration();
      if (d) {
        if (!seeking) seek.value = String((currentTime() / d) * 1000);
        timeLabel.textContent = fmt(currentTime()) + " / " + fmt(d);
      }
    }

    fsBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    let idleTimer = null;
    function poke() {
      ui.classList.remove("idle");
      document.body.style.cursor = "default";
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        if (isPlaying) { ui.classList.add("idle"); document.body.style.cursor = "none"; }
      }, 3200);
    }
    window.addEventListener("mousemove", poke);
    window.addEventListener("touchstart", poke, { passive: true });

    // ---- Canvas ----
    let W = 0, H = 0, DPR = 1;
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = Math.floor(window.innerWidth * DPR);
      H = Math.floor(window.innerHeight * DPR);
      canvas.width = W;
      canvas.height = H;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);
    }
    window.addEventListener("resize", resize);
    resize();

    // ---- Draw ----
    // Slowly-evolving motion state, layered on top of the live trace so the
    // figure never repeats exactly. None of this changes the green look.
    let t = 0, last = performance.now();
    let rot = 0;            // drifting rotation of the whole figure
    let slow = 1;           // current pace multiplier
    let slowTarget = 1;     // pace it's easing toward
    let nextEvent = 0;      // time of the next random pace change
    let twist = 0;          // amplitude-dependent swirl
    let breathe = 1;        // breathing zoom

    // Faint, fixed oscilloscope graticule (measurement grid) drawn behind the
    // trace in screen space — it stays put while the trace moves over it.
    function drawGrid() {
      const cell = Math.min(W, H) / 10;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineWidth = 1 * DPR;
      ctx.strokeStyle = "rgba(0, 255, 100, 0.05)";
      ctx.beginPath();
      for (let x = (W / 2) % cell; x <= W; x += cell) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
      for (let y = (H / 2) % cell; y <= H; y += cell) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
      ctx.stroke();
      // Brighter center cross-hairs.
      ctx.strokeStyle = "rgba(0, 255, 100, 0.13)";
      ctx.beginPath();
      ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H);
      ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawScope(sens, flicker) {
      const n = scopeL.length;
      const scale = Math.min(W, H) * 0.42;

      // Mono tracks have identical L/R, which collapses X-Y to a flat diagonal.
      // Detect that and offset Y by a short phase delay so it still loops.
      let diff = 0;
      for (let i = 0; i < n; i += 64) diff += Math.abs(scopeL[i] - scopeR[i]);
      const stereo = diff > 0.02;
      const delay = Math.floor(n * 0.012);

      ctx.save();
      ctx.translate(W / 2, H / 2);
      ctx.rotate(rot);
      ctx.scale(breathe, breathe);
      ctx.globalCompositeOperation = "lighter";
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.beginPath();
      const inv = 1 / scale;
      for (let i = 0; i < n; i++) {
        const px = scopeL[i] * scale * sens;
        const py = (stereo ? scopeR[i] : scopeL[(i + delay) % n]) * scale * sens;
        // Swirl outer points more than inner ones, so the figure morphs
        // organically instead of moving as a rigid shape.
        const r = Math.sqrt(px * px + py * py) * inv;
        const a = twist * r;
        const ca = Math.cos(a), sa = Math.sin(a);
        const x = px * ca - py * sa;
        const y = px * sa + py * ca;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.lineWidth = 1.6 * DPR;
      ctx.shadowBlur = 12 * DPR;
      ctx.shadowColor = "rgba(0, 255, 100, 0.9)";
      ctx.strokeStyle = "rgba(120, 255, 150, " + (0.95 * flicker).toFixed(3) + ")";
      ctx.stroke();
      ctx.restore();
    }

    function frame(now) {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      try {
        if (analyserL) {
          analyserL.getFloatTimeDomainData(scopeL);
          analyserR.getFloatTimeDomainData(scopeR);
          updateTransport();

          t += dt;

          // Every few seconds, randomly pick a new pace: sometimes a slow-mo
          // drift, sometimes a brisker one. Randomized, so it's never the same.
          if (t > nextEvent) {
            nextEvent = t + 3 + Math.random() * 6;
            slowTarget = Math.random() < 0.45
              ? 0.15 + Math.random() * 0.3
              : 0.8 + Math.random() * 0.6;
          }
          slow += (slowTarget - slow) * dt * 1.2;

          // Layered, slow LFOs (scaled by the current pace) drive the motion.
          const rotRate = (0.06 + 0.05 * Math.sin(t * 0.13)) * slow;
          rot += rotRate * dt;
          twist = (0.28 * Math.sin(t * 0.27 * slow + 0.5) + 0.12 * Math.sin(t * 0.11));
          breathe = 1 + 0.06 * Math.sin(t * 0.5 * slow) + 0.035 * Math.sin(t * 0.21 + 1.3);

          const sens = parseFloat(sensitivityInput.value);
          const trail = parseFloat(trailsInput.value);

          // Phosphor fade: translucent black over the previous frame.
          ctx.globalCompositeOperation = "source-over";
          ctx.fillStyle = "rgba(0, 0, 0, " + trail + ")";
          ctx.fillRect(0, 0, W, H);

          drawGrid();

          // Subtle analog brightness flicker.
          const flicker = 0.92 + 0.08 * Math.sin(t * 7.3 + Math.sin(t * 2.1) * 2);
          drawScope(sens, flicker);
        } else {
          ctx.fillStyle = "rgba(0,0,0,0.3)";
          ctx.fillRect(0, 0, W, H);
        }
      } catch (err) {
        console.error("render error:", err);
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); togglePlay(); }
      else if (e.key === "f" || e.key === "F") fsBtn.click();
    });
  })();
  </script>
</body>
</html>
