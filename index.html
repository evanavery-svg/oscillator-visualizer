<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oscilloscope</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #4dff88;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      user-select: none;
    }
    #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
    .hidden { display: none !important; }

    .drop-hint {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      z-index: 10;
    }
    .drop-hint-inner { pointer-events: none; }
    .logo {
      font-size: clamp(1.6rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      color: #4dff88;
      text-shadow: 0 0 18px rgba(77, 255, 136, 0.7);
      margin-bottom: 1rem;
    }
    .drop-hint p { font-size: 1rem; opacity: 0.7; margin: 0.3rem 0; }
    .drop-hint .sub { font-size: 0.8rem; opacity: 0.4; }

    .ui {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: min(620px, calc(100% - 32px));
      background: rgba(0, 12, 4, 0.6);
      border: 1px solid rgba(77, 255, 136, 0.25);
      border-radius: 14px;
      padding: 12px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 20;
      transition: opacity 0.4s ease;
    }
    .ui.idle { opacity: 0; pointer-events: none; }

    .now-playing {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .transport { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .icon-btn {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(77, 255, 136, 0.4);
      background: rgba(77, 255, 136, 0.1);
      color: #4dff88;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .icon-btn:hover { background: rgba(77, 255, 136, 0.22); }
    .time { flex: 0 0 auto; font-variant-numeric: tabular-nums; font-size: 0.8rem; opacity: 0.75; }

    .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 14px 20px; }
    .ctl {
      display: flex; flex-direction: column; gap: 4px;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8;
    }
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 4px; background: rgba(77, 255, 136, 0.35); outline: none;
    }
    input[type="range"].seek { flex: 1 1 auto; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: #4dff88; cursor: pointer; box-shadow: 0 0 8px rgba(77, 255, 136, 0.9);
    }
    input[type="range"]::-moz-range-thumb {
      width: 13px; height: 13px; border: none; border-radius: 50%; background: #4dff88; cursor: pointer;
    }
    .text-btn {
      background: transparent;
      border: 1px solid rgba(77, 255, 136, 0.3);
      color: #4dff88;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.72rem;
      cursor: pointer;
      margin-top: 12px;
    }
    .text-btn:hover { background: rgba(77, 255, 136, 0.15); }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="dropHint" class="drop-hint">
    <div class="drop-hint-inner">
      <div class="logo">OSCILLOSCOPE</div>
      <p>Drop an MP3 anywhere, or click to choose a file</p>
      <p class="sub">Stereo tracks draw the best figures. Audio stays in your browser.</p>
    </div>
  </div>

  <div id="ui" class="ui hidden">
    <div class="now-playing" id="nowPlaying">—</div>
    <div class="transport">
      <button id="playBtn" class="icon-btn" title="Play / Pause" aria-label="Play or pause">▶</button>
      <input id="seek" class="seek" type="range" min="0" max="1000" value="0" step="1" />
      <span id="time" class="time">0:00 / 0:00</span>
    </div>
    <div class="controls">
      <label class="ctl">
        <span>Sensitivity</span>
        <input id="sensitivity" type="range" min="0.3" max="2.5" step="0.05" value="1" />
      </label>
      <label class="ctl">
        <span>Shape</span>
        <input id="motion" type="range" min="0" max="1" step="0.01" value="0.4" />
      </label>
      <label class="ctl">
        <span>Audio</span>
        <input id="react" type="range" min="0" max="1" step="0.01" value="1" />
      </label>
      <button id="newFileBtn" class="text-btn">Load another</button>
      <button id="fsBtn" class="text-btn">Fullscreen</button>
    </div>
  </div>

  <input id="fileInput" type="file" accept="audio/*,.mp3" hidden />

  <script>
  /* Minimal X-Y oscilloscope.
   * Left channel -> X, right channel -> Y, drawn as a glowing green trace on
   * black with phosphor persistence (the Persistence slider controls how long
   * the trail lingers). Audio is decoded locally; nothing is uploaded.
   */
  (() => {
    "use strict";

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d", { alpha: false });
    const dropHint = document.getElementById("dropHint");
    const ui = document.getElementById("ui");
    const fileInput = document.getElementById("fileInput");
    const playBtn = document.getElementById("playBtn");
    const seek = document.getElementById("seek");
    const timeLabel = document.getElementById("time");
    const nowPlaying = document.getElementById("nowPlaying");
    const sensitivityInput = document.getElementById("sensitivity");
    const motionInput = document.getElementById("motion");
    const reactInput = document.getElementById("react");
    const newFileBtn = document.getElementById("newFileBtn");
    const fsBtn = document.getElementById("fsBtn");

    // ---- Audio ----
    let audioCtx = null;
    let splitter = null;
    let analyserL = null, analyserR = null;
    let scopeL = null, scopeR = null;

    let audioBuffer = null;
    let sourceNode = null;
    let isPlaying = false;
    let startedAt = 0;
    let pausedAt = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      splitter = audioCtx.createChannelSplitter(2);
      analyserL = audioCtx.createAnalyser();
      analyserR = audioCtx.createAnalyser();
      analyserL.fftSize = 2048;
      analyserR.fftSize = 2048;
      splitter.connect(analyserL, 0);
      splitter.connect(analyserR, 1);
      scopeL = new Float32Array(analyserL.fftSize);
      scopeR = new Float32Array(analyserR.fftSize);
    }

    const duration = () => (audioBuffer ? audioBuffer.duration : 0);

    function currentTime() {
      if (!audioBuffer) return 0;
      const tNow = isPlaying ? pausedAt + (audioCtx.currentTime - startedAt) : pausedAt;
      return Math.max(0, Math.min(tNow, duration()));
    }

    function stopSource() {
      if (sourceNode) {
        sourceNode.onended = null;
        try { sourceNode.stop(); } catch (_) {}
        try { sourceNode.disconnect(); } catch (_) {}
        sourceNode = null;
      }
    }

    function startPlayback(offset) {
      if (!audioBuffer) return;
      if (offset >= duration()) offset = 0;
      stopSource();
      if (audioCtx.state === "suspended") audioCtx.resume();

      sourceNode = audioCtx.createBufferSource();
      sourceNode.buffer = audioBuffer;
      sourceNode.connect(audioCtx.destination); // sound
      sourceNode.connect(splitter);             // scope data (L/R)
      sourceNode.onended = () => {
        isPlaying = false;
        pausedAt = duration();
        playBtn.textContent = "▶";
      };
      sourceNode.start(0, offset);
      startedAt = audioCtx.currentTime;
      pausedAt = offset;
      isPlaying = true;
      playBtn.textContent = "❚❚";
    }

    function pausePlayback() {
      if (!isPlaying) return;
      pausedAt = currentTime();
      stopSource();
      isPlaying = false;
      playBtn.textContent = "▶";
    }

    function togglePlay() {
      if (!audioBuffer) { fileInput.click(); return; }
      if (isPlaying) pausePlayback();
      else startPlayback(pausedAt >= duration() ? 0 : pausedAt);
    }

    async function loadFile(file) {
      if (!file) return;
      initAudio();
      if (audioCtx.state === "suspended") await audioCtx.resume();

      nowPlaying.textContent = "Decoding…  " + file.name;
      dropHint.classList.add("hidden");
      ui.classList.remove("hidden");

      try {
        const arrayBuf = await file.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(arrayBuf);
        stopSource();
        audioBuffer = decoded;
        pausedAt = 0;
        nowPlaying.textContent = "♪  " + file.name;
        startPlayback(0);
      } catch (err) {
        nowPlaying.textContent = "⚠ Couldn't decode “" + file.name + "” — try a standard MP3/WAV/OGG.";
        console.error("decodeAudioData failed:", err);
      }
    }

    fileInput.addEventListener("change", (e) => loadFile(e.target.files[0]));
    dropHint.addEventListener("click", () => fileInput.click());
    newFileBtn.addEventListener("click", () => fileInput.click());

    ["dragenter", "dragover"].forEach((ev) =>
      window.addEventListener(ev, (e) => { e.preventDefault(); })
    );
    window.addEventListener("drop", (e) => {
      e.preventDefault();
      const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    playBtn.addEventListener("click", togglePlay);

    function fmt(s) {
      if (!isFinite(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ":" + String(sec).padStart(2, "0");
    }

    let seeking = false;
    seek.addEventListener("input", () => { seeking = true; });
    seek.addEventListener("change", () => {
      const target = (seek.value / 1000) * duration();
      if (isPlaying) startPlayback(target);
      else { pausedAt = target; }
      seeking = false;
    });

    function updateTransport() {
      const d = duration();
      if (d) {
        if (!seeking) seek.value = String((currentTime() / d) * 1000);
        timeLabel.textContent = fmt(currentTime()) + " / " + fmt(d);
      }
    }

    fsBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    let idleTimer = null;
    function poke() {
      ui.classList.remove("idle");
      document.body.style.cursor = "default";
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        if (isPlaying) { ui.classList.add("idle"); document.body.style.cursor = "none"; }
      }, 3200);
    }
    window.addEventListener("mousemove", poke);
    window.addEventListener("touchstart", poke, { passive: true });

    // ---- Canvas ----
    let W = 0, H = 0, DPR = 1;
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = Math.floor(window.innerWidth * DPR);
      H = Math.floor(window.innerHeight * DPR);
      canvas.width = W;
      canvas.height = H;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);
    }
    window.addEventListener("resize", resize);
    resize();

    // ---- Draw ----
    // Slowly-evolving motion state, layered on top of the live trace so the
    // figure never repeats exactly. None of this changes the green look.
    let t = 0, last = performance.now();
    let rot = 0;            // precessing rotation of the figure
    let energy = 0;         // smoothed loudness (RMS) of the signal
    let slow = 1;           // current pace multiplier
    let slowTarget = 1;     // pace it's easing toward
    let nextEvent = 0;      // time of the next random pace change
    let breathe = 1;        // breathing zoom

    // Shape morphing: the line eases from one 3D form to another every ~30s.
    let formA = 0, formB = 0, morph = 1, nextShape = 0;
    const NFORMS = 6;

    function drawScope(sens, energy, flicker, motion, react) {
      const n = scopeL.length;
      const TWO_PI = Math.PI * 2;
      const PI = Math.PI;
      const baseR = Math.min(W, H) * 0.40 * sens;

      // "Shape" = how many times the single line winds. Audio (react) sets how
      // much the sound displaces the line: 0 = fully contained clean form,
      // 1 = full distortion like before.
      const loops = 1 + motion * 14;
      const amp = (0.3 + Math.min(energy, 0.5)) * react;
      const tilt = 0.6 + 0.4 * Math.sin(t * 0.13);
      const ct = Math.cos(tilt), st = Math.sin(tilt);

      // The 3D forms the line can take. Each maps path position p (0..1) and the
      // audio sample s to a point [x,y,z]; `a` is the audio displacement.
      function formPoint(form, p, s, out) {
        const a = s * amp;
        const th = p * TWO_PI * loops + rot;
        let x, y, z;
        switch (form) {
          case 1: { // torus
            const R = baseR * 0.68, r2 = baseR * 0.30 * (1 + a);
            const v = p * TWO_PI * Math.max(2, Math.round(loops * 0.5));
            const rr = R + r2 * Math.cos(v);
            x = rr * Math.cos(th); y = r2 * Math.sin(v); z = rr * Math.sin(th);
            break;
          }
          case 2: { // helix / spring
            const r = baseR * 0.6 * (1 + a);
            x = r * Math.cos(th); y = (p - 0.5) * 2 * baseR; z = r * Math.sin(th);
            break;
          }
          case 3: { // lissajous knot
            const R = baseR * (1 + a * 0.5);
            const C = Math.max(2, Math.round(loops * 0.5));
            x = R * Math.sin(3 * p * TWO_PI + rot);
            y = R * Math.sin(2 * p * TWO_PI);
            z = R * Math.sin(C * p * TWO_PI + rot * 0.5);
            break;
          }
          case 4: { // cone spiral
            const r = baseR * p * (1 + a);
            x = r * Math.cos(th); y = (p - 0.5) * 2 * baseR; z = r * Math.sin(th);
            break;
          }
          case 5: { // rose / flower with a depth wave
            const k = Math.max(2, Math.round(2 + loops * 0.4));
            const rr = baseR * (0.35 + 0.65 * Math.abs(Math.cos(k * p * TWO_PI))) * (1 + a);
            const ang = p * TWO_PI * Math.max(1, Math.round(loops * 0.3)) + rot;
            x = rr * Math.cos(ang); y = rr * Math.sin(ang); z = baseR * 0.3 * Math.sin(p * TWO_PI * 3);
            break;
          }
          default: { // 0: globe / sphere
            const r = baseR * (1 + a);
            const phi = p * PI, sp = Math.sin(phi);
            x = r * sp * Math.cos(th); y = r * Math.cos(phi); z = r * sp * Math.sin(th);
          }
        }
        out[0] = x; out[1] = y; out[2] = z;
      }

      const A = [0, 0, 0], B = [0, 0, 0];
      const path = new Path2D();
      for (let i = 0; i < n; i++) {
        const p = i / n;
        const s = (scopeL[i] + scopeR[i]) * 0.5;
        formPoint(formA, p, s, A);
        let x3 = A[0], y3 = A[1], z3 = A[2];
        if (morph < 1) {              // ease between the old and new form
          formPoint(formB, p, s, B);
          x3 += (B[0] - x3) * morph;
          y3 += (B[1] - y3) * morph;
          z3 += (B[2] - z3) * morph;
        }
        const x = x3;
        const y = y3 * ct - z3 * st;  // tilt, then drop depth (ortho)
        if (i === 0) path.moveTo(x, y); else path.lineTo(x, y);
      }

      ctx.save();
      ctx.translate(W / 2, H / 2);
      ctx.globalCompositeOperation = "lighter";
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      // Green glow underneath...
      ctx.lineWidth = (2.2 + energy * 4 * react) * DPR;
      ctx.shadowBlur = 16 * DPR;
      ctx.shadowColor = "rgba(0, 255, 110, 0.9)";
      ctx.strokeStyle = "rgba(40, 255, 120, " + (0.5 * flicker).toFixed(3) + ")";
      ctx.stroke(path);

      // ...hot near-white core on top.
      ctx.lineWidth = (0.9 + energy * 1.4 * react) * DPR;
      ctx.shadowBlur = 5 * DPR;
      ctx.strokeStyle = "rgba(200, 255, 215, " + (0.95 * flicker).toFixed(3) + ")";
      ctx.stroke(path);

      ctx.restore();
    }

    function frame(now) {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      try {
        if (analyserL) {
          analyserL.getFloatTimeDomainData(scopeL);
          analyserR.getFloatTimeDomainData(scopeR);
          updateTransport();

          const n = scopeL.length;
          t += dt;

          // Track loudness (RMS). Quiet passages settle into one calm line;
          // loud passages whip the line around into a tangle of loops.
          let sum = 0, cnt = 0;
          for (let i = 0; i < n; i += 4) { const v = scopeL[i]; sum += v * v; cnt++; }
          energy += (Math.sqrt(sum / cnt) - energy) * 0.12;

          // Every few seconds pick a new pace at random: nearly still, fast, or
          // reversed. This drift is what carries it from stable to crazy.
          if (t > nextEvent) {
            nextEvent = t + 3 + Math.random() * 6;
            const r = Math.random();
            slowTarget = r < 0.35 ? 0.05 + Math.random() * 0.2
                       : r < 0.70 ? 0.9 + Math.random() * 0.8
                       :          -(0.6 + Math.random() * 0.8);
          }
          slow += (slowTarget - slow) * dt * 1.0;

          // Rotation precesses the line; with long persistence its past
          // positions stack into the looping circle. Loudness speeds it up, and
          // the Motion slider scales it — at 0 the line stops precessing and
          // stays a single stable stroke.
          // One master slider. Near 0: no precession + fast-clearing trail =>
          // a single clean line. Toward 1: precession + long trails build the
          // looping tangle.
          const motion = parseFloat(motionInput.value);
          const react = parseFloat(reactInput.value);
          // Steady spin; loudness only speeds it up as far as Audio allows.
          rot += (0.3 + energy * 1.8 * react) * slow * dt;

          // Switch to a new (different) form roughly every 30s, easing ~2s.
          if (t > nextShape) {
            nextShape = t + 25 + Math.random() * 10;
            formA = formB;
            formB = (formB + 1 + Math.floor(Math.random() * (NFORMS - 1))) % NFORMS;
            morph = 0;
          }
          if (morph < 1) morph = Math.min(1, morph + dt * 0.5);

          const sens = parseFloat(sensitivityInput.value);

          // No trails — clear the frame completely every time.
          ctx.globalCompositeOperation = "source-over";
          ctx.fillStyle = "#000";
          ctx.fillRect(0, 0, W, H);

          // Subtle analog brightness flicker.
          const flicker = 0.9 + 0.1 * Math.sin(t * 7.3 + Math.sin(t * 2.1) * 2);
          drawScope(sens, energy, flicker, motion, react);
        } else {
          ctx.fillStyle = "rgba(0,0,0,0.3)";
          ctx.fillRect(0, 0, W, H);
        }
      } catch (err) {
        console.error("render error:", err);
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); togglePlay(); }
      else if (e.key === "f" || e.key === "F") fsBtn.click();
    });
  })();
  </script>
</body>
</html>
